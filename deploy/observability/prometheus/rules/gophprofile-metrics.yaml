groups:
  - name: gophprofile
    rules:
      - alert: HighHTTPErrorRate
        expr: |
          sum(rate(http_server_requests_total{job="gophprofile-server",status_class="5xx"}[5m]))
          /
          sum(rate(http_server_requests_total{job="gophprofile-server"}[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High HTTP 5xx rate on gophprofile-server
          description: More than 10% of HTTP requests return 5xx over the last 5 minutes.

      - alert: HighUploadErrorRate
        expr: |
          sum(rate(avatars_uploads_total{job="gophprofile-server",status="error"}[5m]))
          /
          sum(rate(avatars_uploads_total{job="gophprofile-server"}[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High avatar upload error rate
          description: More than 10% of uploads fail over the last 5 minutes.

      - alert: HighUploadLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(avatars_upload_duration_seconds_bucket{job="gophprofile-server"}[5m]))
          ) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: High avatar upload latency (p95)
          description: 95th percentile upload duration exceeds 5 seconds.

      - alert: OutboxBacklog
        expr: outbox_pending_messages{job="gophprofile-server"} > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Outbox backlog is growing
          description: More than 100 pending outbox messages for 10 minutes.

      - alert: RabbitMQQueueBacklog
        expr: rabbitmq_queue_messages_ready{queue="avatar-processing"} > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: RabbitMQ avatar-processing queue backlog
          description: More than 50 ready messages in avatar-processing queue for 10 minutes.

      - alert: RabbitMQDLQMessages
        expr: rabbitmq_queue_messages{queue="avatar-processing.dlq"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Messages in avatar-processing DLQ
          description: Dead-letter queue avatar-processing.dlq contains unprocessed messages.
