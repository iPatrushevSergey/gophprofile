receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    compression: gzip
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource/add-job:
    attributes:
      - key: job
        from_attribute: service.name
        action: upsert

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    logs:
      receivers: [otlp]
      processors: [resource/add-job, batch]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp]
      processors: [resource/add-job, batch]
      exporters: [prometheus]
