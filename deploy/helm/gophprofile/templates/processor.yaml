{{- if .Values.processor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gophprofile.fullname" . }}-processor
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  replicas: {{ .Values.processor.replicas }}
  selector:
    matchLabels:
      {{- include "gophprofile.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: processor
  template:
    metadata:
      labels:
        {{- include "gophprofile.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: processor
    spec:
      serviceAccountName: {{ include "gophprofile.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.processor.terminationGracePeriodSeconds }}
      securityContext:
        {{- include "gophprofile.podSecurityContext" .Values.securityContext | nindent 8 }}
      initContainers:
        - name: wait-postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h {{ include "gophprofile.fullname" . }}-postgres -U {{ .Values.postgres.user }} -d {{ .Values.postgres.database }}; do
                sleep 2
              done
        - name: wait-migrate
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            {{- include "gophprofile.postgresPasswordEnv" . | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              until psql -h {{ include "gophprofile.fullname" . }}-postgres -U {{ .Values.postgres.user }} -d {{ .Values.postgres.database }} -c "SELECT 1 FROM goose_db_version LIMIT 1" >/dev/null 2>&1; do
                sleep 2
              done
      containers:
        - name: processor
          image: "{{ .Values.processor.image.repository }}:{{ .Values.processor.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            {{- include "gophprofile.containerSecurityContext" . | nindent 12 }}
          env:
            {{- include "gophprofile.containerEnv" . | nindent 12 }}
            - name: GOPHPROFILE_MINIO_USE_SSL
              value: {{ .Values.processor.env.minioUseSSL | quote }}
            - name: GOPHPROFILE_TELEMETRY_ENABLED
              value: {{ .Values.processor.env.telemetryEnabled | quote }}
            - name: GOPHPROFILE_TELEMETRY_ENVIRONMENT
              value: {{ .Values.processor.env.telemetryEnvironment | quote }}
            - name: GOPHPROFILE_METRICS_ENABLED
              value: {{ .Values.processor.env.metricsEnabled | quote }}
            - name: GOPHPROFILE_LOGGER_BACKEND
              value: {{ .Values.processor.env.loggerBackend | quote }}
            - name: GOPHPROFILE_LOGGER_FORMAT
              value: {{ .Values.processor.env.loggerFormat | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kill -0 1
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.processor.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
