{{- if .Values.externalSecrets.enabled }}
{{- $fullname := include "gophprofile.fullname" . -}}
{{- $ns := .Values.namespace.name -}}
{{- $store := .Values.externalSecrets.clusterSecretStore -}}
{{- $refresh := .Values.externalSecrets.refreshInterval -}}
{{- $pgPath := .Values.externalSecrets.vault.paths.postgres -}}
{{- $minioPath := .Values.externalSecrets.vault.paths.minio -}}
{{- $rmqPath := .Values.externalSecrets.vault.paths.rabbitmq -}}
{{- $grafPath := .Values.externalSecrets.vault.paths.grafana -}}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-postgres
  namespace: {{ $ns }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $fullname }}-postgres
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        POSTGRES_USER: {{ .Values.postgres.user | quote }}
        POSTGRES_PASSWORD: "{{`{{ .pg_password }}`}}"
        POSTGRES_DB: {{ .Values.postgres.database | quote }}
  data:
    - secretKey: pg_password
      remoteRef:
        key: {{ $pgPath }}
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-minio
  namespace: {{ $ns }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $fullname }}-minio
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MINIO_ROOT_USER: "{{`{{ .minio_user }}`}}"
        MINIO_ROOT_PASSWORD: "{{`{{ .minio_password }}`}}"
  data:
    - secretKey: minio_user
      remoteRef:
        key: {{ $minioPath }}
        property: rootUser
    - secretKey: minio_password
      remoteRef:
        key: {{ $minioPath }}
        property: rootPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-rabbitmq
  namespace: {{ $ns }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $fullname }}-rabbitmq
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.user | quote }}
        RABBITMQ_DEFAULT_PASS: "{{`{{ .rmq_password }}`}}"
  data:
    - secretKey: rmq_password
      remoteRef:
        key: {{ $rmqPath }}
        property: password
{{- if .Values.observability.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-grafana
  namespace: {{ $ns }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $fullname }}-grafana
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        GF_SECURITY_ADMIN_PASSWORD: "{{`{{ .grafana_password }}`}}"
  data:
    - secretKey: grafana_password
      remoteRef:
        key: {{ $grafPath }}
        property: adminPassword
{{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-app
  namespace: {{ $ns }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $store }}
    kind: ClusterSecretStore
  target:
    name: {{ $fullname }}-app
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        GOPHPROFILE_DATABASE_URI: 'postgres://{{ .Values.postgres.user }}:{{`{{ .pg_password }}`}}@{{ $fullname }}-postgres:5432/{{ .Values.postgres.database }}?sslmode=disable'
        GOPHPROFILE_BROKER_URL: 'amqp://{{ .Values.rabbitmq.user }}:{{`{{ .rmq_password }}`}}@{{ $fullname }}-rabbitmq:5672/'
        GOPHPROFILE_MINIO_ACCESS_KEY: "{{`{{ .minio_user }}`}}"
        GOPHPROFILE_MINIO_SECRET_KEY: "{{`{{ .minio_password }}`}}"
  data:
    - secretKey: pg_password
      remoteRef:
        key: {{ $pgPath }}
        property: password
    - secretKey: rmq_password
      remoteRef:
        key: {{ $rmqPath }}
        property: password
    - secretKey: minio_user
      remoteRef:
        key: {{ $minioPath }}
        property: rootUser
    - secretKey: minio_password
      remoteRef:
        key: {{ $minioPath }}
        property: rootPassword
{{- end }}
