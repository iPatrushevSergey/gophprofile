{{- if .Values.rabbitmq.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gophprofile.fullname" . }}-rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
data:
  rabbitmq.conf: |
{{ .Files.Get "configs/rabbitmq/rabbitmq.conf" | indent 4 }}
  enabled_plugins: |
{{ .Files.Get "configs/rabbitmq/enabled_plugins" | indent 4 }}
  definitions.json: |
{{ .Files.Get "configs/rabbitmq/definitions.json" | indent 4 }}
---
{{- if not .Values.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gophprofile.fullname" . }}-rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.user | quote }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.rabbitmq.password | quote }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gophprofile.fullname" . }}-rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
spec:
  type: ClusterIP
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: metrics
      port: 15692
      targetPort: 15692
  selector:
    {{- include "gophprofile.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gophprofile.fullname" . }}-rabbitmq
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
spec:
  serviceName: {{ include "gophprofile.fullname" . }}-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      {{- include "gophprofile.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rabbitmq
  template:
    metadata:
      labels:
        {{- include "gophprofile.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
            - name: metrics
              containerPort: 15692
          envFrom:
            - secretRef:
                name: {{ include "gophprofile.fullname" . }}-rabbitmq
          volumeMounts:
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
            - name: data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - check_port_connectivity
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.rabbitmq.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "gophprofile.fullname" . }}-rabbitmq
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.rabbitmq.storageClassName }}
        storageClassName: {{ .Values.rabbitmq.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.rabbitmq.storage }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gophprofile.fullname" . }}-rabbitmq-init
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-8"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "gophprofile.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rabbitmq-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: rabbitmq-init
          image: curlimages/curl:8.5.0
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "gophprofile.fullname" . }}-rabbitmq
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "gophprofile.fullname" . }}-rabbitmq
                  key: RABBITMQ_DEFAULT_PASS
          command:
            - /bin/sh
            - -c
            - |
              until curl -fsS -u "${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}" \
                "http://{{ include "gophprofile.fullname" . }}-rabbitmq:15672/api/overview" >/dev/null; do
                sleep 2
              done
              curl -fsS -u "${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}" \
                -H "Content-Type: application/json" \
                -X POST \
                --data-binary @/topology/definitions.json \
                "http://{{ include "gophprofile.fullname" . }}-rabbitmq:15672/api/definitions"
          volumeMounts:
            - name: topology
              mountPath: /topology
              readOnly: true
      volumes:
        - name: topology
          configMap:
            name: {{ include "gophprofile.fullname" . }}-rabbitmq
            items:
              - key: definitions.json
                path: definitions.json
{{- end }}
